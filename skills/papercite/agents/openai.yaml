interface:
  display_name: "papercite"
  short_description: "Run the bundled fast-track Word citation workflow and generate cited output files."
  default_prompt: "Use $papercite to run the bundled fast-track paper citation workflow on a .docx file, default to --backend codex --mode fast, ask at most one upfront question for Chinese and English reference counts when the user wants custom counts, and otherwise use the default split before generating the final cited document plus references. If fast mode pauses for one response, prefer the compact JSON shape with `analysis`, `refs`, and `cites`."
